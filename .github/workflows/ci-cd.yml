name: Productive CI/CD Pipeline

on:
    push:
        branches: [main]
        paths-ignore:
            - '**.md'
    pull_request:
        branches: [main]
        paths-ignore:
            - '**.md'
    workflow_dispatch:

# Prevent overlapping deployments: Cancel in-progress runs on the same branch
concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

env:
    NODE_VERSION: '20'

permissions:
    contents: read

jobs:
    # 1. Security Audit (Fail Fast on high+ vulnerabilities)
    # Uses OSV Scanner (reads lockfile directly via Google OSV database) because
    # pnpm audit relies on a retired npm registry endpoint (410 Gone as of 2026-04).
    security-audit:
        name: 🛡️ Security Audit
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - name: Install OSV Scanner
              run: |
                  curl -sSL https://github.com/google/osv-scanner/releases/latest/download/osv-scanner_linux_amd64 \
                    -o /usr/local/bin/osv-scanner
                  chmod +x /usr/local/bin/osv-scanner
            - name: Audit Dependencies
              # Scan pnpm lockfile against Google OSV vulnerability database.
              # Exits non-zero if any HIGH or CRITICAL vulnerabilities are found.
              run: osv-scanner --lockfile pnpm-lock.yaml

    # 2. Quality Checks (Lint, Unit, Build)
    quality-checks:
        name: ⚡ Quality Checks
        runs-on: ubuntu-latest
        timeout-minutes: 10
        env:
            VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || 'https://placeholder.supabase.co' }}
            VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY || 'placeholder-anon-key' }}
        steps:
            - uses: actions/checkout@v4
            - uses: pnpm/action-setup@v3
              with:
                  version: 9.15.9
            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: 'pnpm'

            - name: Install Dependencies
              run: pnpm install --frozen-lockfile

            - name: Run Lint
              run: pnpm lint

            - name: Type Check
              run: pnpm typecheck

            - name: Run Unit Tests with Coverage
              run: pnpm test -- --run --coverage

            - name: Upload Coverage Report
              uses: actions/upload-artifact@v4
              with:
                  name: coverage-report
                  path: coverage/
                  retention-days: 14

            - name: Build Project
              run: pnpm build

    # 3. E2E Tests (blocks deployment — must pass before deploy)
    e2e-tests:
        name: 🎭 E2E Tests
        runs-on: ubuntu-latest
        timeout-minutes: 20
        env:
            VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || 'https://placeholder.supabase.co' }}
            VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY || 'placeholder-anon-key' }}
        steps:
            - uses: actions/checkout@v4

            - uses: pnpm/action-setup@v3
              with:
                  version: 9.15.9
            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: 'pnpm'

            - name: Install Dependencies
              run: pnpm install --frozen-lockfile

            - name: Get installed Playwright version
              id: playwright-version
              run: echo "version=$(node -e "console.log(require('./node_modules/@playwright/test/package.json').version)")" >> $GITHUB_OUTPUT

            - name: Cache Playwright Binaries
              uses: actions/cache@v4
              id: playwright-cache
              with:
                  path: |
                      ~/.cache/ms-playwright
                  key: ${{ runner.os }}-playwright-${{ steps.playwright-version.outputs.version }}

            - name: Install Playwright Browsers
              if: steps.playwright-cache.outputs.cache-hit != 'true'
              run: npx playwright install --with-deps

            - name: Install Dependencies for Browsers (Always)
              run: npx playwright install-deps

            - name: Build for E2E
              run: pnpm build

            - name: Run E2E Tests
              run: npx playwright test
              env:
                  CI: true

            - name: Upload Playwright Report
              if: failure()
              uses: actions/upload-artifact@v4
              with:
                  name: playwright-report
                  path: playwright-report/
                  retention-days: 30

    # 4. Deploy to Vercel (Frontend) - Depends on all quality gates including E2E
    deploy-vercel:
        name: 🚀 Deploy to Vercel
        needs: [quality-checks, security-audit, e2e-tests]
        # Deploy only on main. Allow push or workflow_dispatch.
        if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
        runs-on: ubuntu-latest
        timeout-minutes: 15
        outputs:
            deployment_url: ${{ steps.deploy_step.outputs.url }}
        steps:
            - uses: actions/checkout@v4

            - uses: pnpm/action-setup@v3
              with:
                  version: 9.15.9

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: 'pnpm'

            - name: Install Dependencies
              run: pnpm install --frozen-lockfile

            - name: Install Vercel CLI
              run: npm install -g vercel@latest

            - name: Validate Required Secrets
              run: |
                  MISSING=""
                  [ -z "$VERCEL_TOKEN" ]          && MISSING="$MISSING VERCEL_TOKEN"
                  [ -z "$VERCEL_ORG_ID" ]         && MISSING="$MISSING VERCEL_ORG_ID"
                  [ -z "$VERCEL_PROJECT_ID" ]     && MISSING="$MISSING VERCEL_PROJECT_ID"
                  [ -z "$VITE_SUPABASE_URL" ]     && MISSING="$MISSING VITE_SUPABASE_URL"
                  [ -z "$VITE_SUPABASE_ANON_KEY" ] && MISSING="$MISSING VITE_SUPABASE_ANON_KEY"
                  if [ -n "$MISSING" ]; then
                    echo "❌ Missing required GitHub secrets:$MISSING"
                    echo "   Configure them at: Repo → Settings → Secrets and variables → Actions"
                    exit 1
                  fi
                  echo "✅ All required secrets present."
              env:
                  VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
                  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
                  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
                  VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
                  VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

            - name: Pull Vercel Environment Information
              run: vercel pull --yes --environment=production --token=$VERCEL_TOKEN --scope=$VERCEL_ORG_ID
              env:
                  VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
                  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
                  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

            - name: Build Project
              run: pnpm build
              env:
                  VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
                  VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
                  VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}

            - name: Deploy to Vercel
              id: deploy_step
              run: |
                  # Remove .git to bypass Vercel's "Git author must have access" check
                  rm -rf .git
                  # Retry up to 4 times with exponential backoff for transient network errors
                  for attempt in 1 2 3 4; do
                    echo "Attempt $attempt..."
                    DEPLOY_OUTPUT=$(vercel deploy --prod --token=$VERCEL_TOKEN --scope=$VERCEL_ORG_ID --yes 2>&1) && {
                      echo "Deploy succeeded on attempt $attempt"
                      # Capture the deployment URL from Vercel CLI output
                      DEPLOY_URL=$(echo "$DEPLOY_OUTPUT" | grep -oP 'https://[^\s]+\.vercel\.app' | tail -1)
                      echo "url=${DEPLOY_URL:-https://licitacion-ai-pro.vercel.app}" >> $GITHUB_OUTPUT
                      exit 0
                    }
                    if [ $attempt -lt 4 ]; then
                      sleep_time=$((2 ** attempt))
                      echo "Deploy failed, retrying in ${sleep_time}s..."
                      sleep $sleep_time
                    fi
                  done
                  echo "Deploy failed after 4 attempts"
                  exit 1
              env:
                  VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
                  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
                  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    # 5. Deploy to Supabase (Backend)
    deploy-supabase:
        name: ⚡ Deploy to Supabase
        needs: deploy-vercel
        if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
        runs-on: ubuntu-latest
        timeout-minutes: 10
        steps:
            - uses: actions/checkout@v4

            - uses: supabase/setup-cli@v1
              with:
                  version: latest

            - name: Link Supabase Project
              run: supabase link --project-ref $SUPABASE_PROJECT_ID
              env:
                  SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
                  SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}

            - name: Push DB Migrations
              # --include-all tolerates remote migrations not found locally (drift).
              # A failed migration blocks the edge function deploy to prevent schema/code mismatch.
              run: supabase db push --include-all --password "$SUPABASE_DB_PASSWORD"
              env:
                  SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
                  SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
                  SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

            - name: Deploy Edge Function
              # JWT verification is handled manually inside the function code (supabase.auth.getUser(token)).
              run: supabase functions deploy analyze-with-agents --no-verify-jwt --project-ref $SUPABASE_PROJECT_ID
              env:
                  SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
                  SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}

    # 6. Smoke Test (Post-Deploy Verification)
    smoke-test:
        name: 💨 Smoke Test
        needs: [deploy-vercel, deploy-supabase]
        if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
        runs-on: ubuntu-latest
        steps:
            - name: Verify Frontend Health
              run: |
                  echo "Checking production URL health..."
                  PROD_URL="${{ needs.deploy-vercel.outputs.deployment_url }}"
                  if [ -z "$PROD_URL" ]; then
                    PROD_URL="https://licitacion-ai-pro.vercel.app"
                  fi
                  echo "Target: $PROD_URL"
                  HTTP_STATUS=$(curl -o /dev/null -s -w "%{http_code}\n" "$PROD_URL")
                  echo "Status Code: $HTTP_STATUS"

                  if [ "$HTTP_STATUS" != "200" ]; then
                    echo "❌ Smoke Test Failed: HTTP $HTTP_STATUS"
                    exit 1
                  fi
                  echo "✅ Frontend Smoke Test Passed: Site is reachable."

            - name: Verify Edge Function CORS
              run: |
                  SUPABASE_URL="https://${{ secrets.SUPABASE_PROJECT_ID }}.supabase.co"
                  echo "Checking Edge Function CORS: $SUPABASE_URL/functions/v1/analyze-with-agents"
                  HTTP_STATUS=$(curl -o /dev/null -s -w "%{http_code}" \
                      -X OPTIONS \
                      -H "Origin: https://licitacion-ai-pro.vercel.app" \
                      -H "Access-Control-Request-Method: POST" \
                      "$SUPABASE_URL/functions/v1/analyze-with-agents")
                  echo "CORS preflight Status: $HTTP_STATUS"

                  if [ "$HTTP_STATUS" != "200" ] && [ "$HTTP_STATUS" != "204" ]; then
                    echo "❌ Edge Function CORS check failed: HTTP $HTTP_STATUS"
                    exit 1
                  fi
                  echo "✅ Edge Function CORS Passed."

    # 7. Docker Build Validation (parallel, does not block deploy)
    docker-build:
        name: 🐳 Docker Build Check
        runs-on: ubuntu-latest
        timeout-minutes: 10
        steps:
            - uses: actions/checkout@v4
            - name: Build Docker Image
              run: docker build -t licitacion-ai-pro:ci-test .
