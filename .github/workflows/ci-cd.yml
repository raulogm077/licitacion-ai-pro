name: Productive CI/CD Pipeline

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]
    workflow_dispatch:

# Prevent overlapping deployments: Cancel in-progress runs on the same branch
concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

env:
    NODE_VERSION: '20'

permissions:
    contents: read
    pull-requests: read

jobs:
    # 1. Security Audit (Fail Fast on high+ vulnerabilities)
    # Uses OSV Scanner (reads lockfile directly via Google OSV database) because
    # pnpm audit relies on a retired npm registry endpoint (410 Gone as of 2026-04).
    security-audit:
        name: 🛡️ Security Audit
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
            - name: Install OSV Scanner
              run: |
                  curl -sSfL https://github.com/google/osv-scanner/releases/latest/download/osv-scanner_linux_amd64 \
                    -o /usr/local/bin/osv-scanner
                  chmod +x /usr/local/bin/osv-scanner
                  osv-scanner --version
            - name: Audit Dependencies
              # Scan pnpm lockfile against Google OSV vulnerability database.
              # Replicates pnpm audit --audit-level=high: only fail on HIGH or CRITICAL.
              # OSV Scanner has no built-in severity filter, so we parse the JSON output.
              run: |
                  set +e
                  osv-scanner --format json --lockfile pnpm-lock.yaml > /tmp/osv-report.json 2>/tmp/osv-err.txt
                  OSV_EXIT=$?
                  set -e

                  if [ $OSV_EXIT -eq 0 ]; then
                    echo "✅ No vulnerabilities found."
                    exit 0
                  fi

                  # Filter for HIGH or CRITICAL only (matches pnpm audit --audit-level=high)
                  HIGH_CRITICAL=$(jq '[.results[]?.packages[]?.vulnerabilities[]?
                    | select(
                        (.database_specific.severity // "") == "HIGH" or
                        (.database_specific.severity // "") == "CRITICAL"
                      )] | length' /tmp/osv-report.json 2>/dev/null || echo "parse-error")

                  if [ "$HIGH_CRITICAL" = "parse-error" ]; then
                    echo "❌ Could not parse OSV report — treating as failure."
                    cat /tmp/osv-err.txt || true
                    cat /tmp/osv-report.json || true
                    exit 1
                  fi

                  if [ "$HIGH_CRITICAL" -gt "0" ]; then
                    echo "❌ Found $HIGH_CRITICAL HIGH/CRITICAL vulnerabilities:"
                    jq -r '.results[]?.packages[]?.vulnerabilities[]?
                      | select(
                          (.database_specific.severity // "") == "HIGH" or
                          (.database_specific.severity // "") == "CRITICAL"
                        )
                      | "\(.database_specific.severity) \(.id): \(.summary // "(no summary)")"' \
                      /tmp/osv-report.json
                    exit 1
                  fi

                  echo "⚠️  Only LOW/MODERATE vulnerabilities found — not blocking (matches pnpm audit --audit-level=high)."
                  exit 0

    repo-integrity:
        name: 🧱 Repo Integrity
        runs-on: ubuntu-latest
        timeout-minutes: 15
        steps:
            - uses: actions/checkout@v6
              with:
                  fetch-depth: 0

            - name: Fetch PR base branch
              if: github.event_name == 'pull_request'
              run: git fetch --no-tags origin ${{ github.base_ref }} --depth=1

            - uses: pnpm/action-setup@v6
              with:
                  version: 9.15.9

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: 'pnpm'

            - uses: supabase/setup-cli@v1
              with:
                  version: latest

            - name: Install Dependencies
              run: pnpm install --frozen-lockfile

            - name: Validate Integrity Secrets
              run: |
                  MISSING=""
                  [ -z "$SUPABASE_ACCESS_TOKEN" ] && MISSING="$MISSING SUPABASE_ACCESS_TOKEN"
                  [ -z "$SUPABASE_DB_PASSWORD" ] && MISSING="$MISSING SUPABASE_DB_PASSWORD"
                  if [ -n "$MISSING" ]; then
                    echo "❌ Missing required GitHub secrets:$MISSING"
                    exit 1
                  fi
              env:
                  SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
                  SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

            - name: Verify Repository Integrity
              run: pnpm verify:integrity
              env:
                  SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
                  SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

            - name: Install actionlint
              run: |
                  ACTIONLINT_VERSION=$(curl -fsSL https://api.github.com/repos/rhysd/actionlint/releases/latest | jq -r '.tag_name')
                  curl -fsSL "https://github.com/rhysd/actionlint/releases/download/${ACTIONLINT_VERSION}/actionlint_${ACTIONLINT_VERSION#v}_linux_amd64.tar.gz" \
                    | tar -xz actionlint
                  sudo mv actionlint /usr/local/bin/actionlint
                  actionlint -version

            - name: Validate GitHub Actions workflows
              run: actionlint -color

            - name: Install shellcheck
              run: |
                  sudo apt-get update
                  sudo apt-get install -y shellcheck

            - name: Validate shell scripts and hooks
              run: shellcheck scripts/*.sh .husky/pre-commit .husky/pre-push

    edge-checks:
        name: 🧪 Edge Function Checks
        runs-on: ubuntu-latest
        timeout-minutes: 10
        steps:
            - uses: actions/checkout@v6
            - uses: denoland/setup-deno@v2
              with:
                  deno-version: v2.x
            - name: Deno Check Existing Edge Function
              run: deno check --node-modules-dir=auto supabase/functions/analyze-with-agents/index.ts
            - name: Deno Check Conversational Edge Function
              run: deno check --node-modules-dir=auto supabase/functions/chat-with-analysis-agent/index.ts
            - name: Deno Test Conversational Tools
              run: deno test --allow-env --node-modules-dir=auto supabase/functions/chat-with-analysis-agent/tools_test.ts

    # 2. Quality Checks (Lint, Unit, Build)
    quality-checks:
        name: ⚡ Quality Checks
        runs-on: ubuntu-latest
        timeout-minutes: 10
        env:
            VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || 'https://placeholder.supabase.co' }}
            VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY || 'placeholder-anon-key' }}
        steps:
            - uses: actions/checkout@v6
            - uses: pnpm/action-setup@v6
              with:
                  version: 9.15.9
            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: 'pnpm'

            - name: Install Dependencies
              run: pnpm install --frozen-lockfile

            - name: Run Lint
              run: pnpm lint

            - name: Type Check
              run: pnpm typecheck

            - name: Run Unit Tests with Coverage
              run: pnpm test -- --run --coverage

            - name: Upload Coverage Report
              uses: actions/upload-artifact@v4
              with:
                  name: coverage-report
                  path: coverage/
                  retention-days: 14

            - name: Build Project
              run: pnpm build

    functional-benchmark:
        name: 📚 Functional Benchmark
        runs-on: ubuntu-latest
        timeout-minutes: 10
        steps:
            - uses: actions/checkout@v6
            - uses: pnpm/action-setup@v6
              with:
                  version: 9.15.9
            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: 'pnpm'

            - name: Install Dependencies
              run: pnpm install --frozen-lockfile

            - name: Run Functional Benchmark
              run: pnpm benchmark:pliegos

    # 3. E2E Tests (blocks deployment — must pass before deploy)
    e2e-tests:
        name: 🎭 E2E Tests
        runs-on: ubuntu-latest
        timeout-minutes: 20
        env:
            VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || 'https://placeholder.supabase.co' }}
            VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY || 'placeholder-anon-key' }}
        steps:
            - uses: actions/checkout@v6

            - uses: pnpm/action-setup@v6
              with:
                  version: 9.15.9
            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: 'pnpm'

            - name: Install Dependencies
              run: pnpm install --frozen-lockfile

            - name: Get installed Playwright version
              id: playwright-version
              run: echo "version=$(node -p 'require(\"./node_modules/@playwright/test/package.json\").version')" >> "$GITHUB_OUTPUT"

            - name: Cache Playwright Binaries
              uses: actions/cache@v4
              id: playwright-cache
              with:
                  path: |
                      ~/.cache/ms-playwright
                  key: ${{ runner.os }}-playwright-${{ steps.playwright-version.outputs.version }}

            - name: Install Playwright Browsers
              if: steps.playwright-cache.outputs.cache-hit != 'true'
              run: npx playwright install --with-deps

            - name: Install Dependencies for Browsers (Always)
              run: npx playwright install-deps

            - name: Build for E2E
              run: pnpm build

            - name: Run E2E Tests
              run: npx playwright test
              env:
                  CI: true

            - name: Upload Playwright Report
              if: failure()
              uses: actions/upload-artifact@v4
              with:
                  name: playwright-report
                  path: playwright-report/
                  retention-days: 30

    release-guard:
        name: 🔐 Release Guard
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        runs-on: ubuntu-latest
        steps:
            - name: Ensure production deploys come from merged PRs
              run: |
                  RESPONSE=$(curl -fsSL \
                    -H "Authorization: Bearer $GITHUB_TOKEN" \
                    -H "Accept: application/vnd.github+json" \
                    "https://api.github.com/repos/${{ github.repository }}/commits/${{ github.sha }}/pulls")

                  MERGED_COUNT=$(echo "$RESPONSE" | jq '[.[] | select(.merged_at != null)] | length')
                  if [ "$MERGED_COUNT" -eq 0 ]; then
                    echo "❌ Direct pushes to main are not deployable. Merge a green PR into main instead."
                    exit 1
                  fi
                  echo "✅ Commit linked to merged PR."
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    # 5. Deploy to Vercel (Frontend) - Depends on all quality gates including E2E
    deploy-vercel:
        name: 🚀 Deploy to Vercel
        needs:
            [
                repo-integrity,
                quality-checks,
                functional-benchmark,
                security-audit,
                edge-checks,
                e2e-tests,
                release-guard,
            ]
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        runs-on: ubuntu-latest
        timeout-minutes: 15
        outputs:
            deployment_url: ${{ steps.deploy_step.outputs.url }}
        steps:
            - uses: actions/checkout@v6

            - uses: pnpm/action-setup@v6
              with:
                  version: 9.15.9

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: 'pnpm'

            - name: Install Dependencies
              run: pnpm install --frozen-lockfile

            - name: Install Vercel CLI
              run: npm install -g vercel@latest

            - name: Validate Required Secrets
              run: |
                  MISSING=""
                  [ -z "$VERCEL_TOKEN" ]          && MISSING="$MISSING VERCEL_TOKEN"
                  [ -z "$VERCEL_ORG_ID" ]         && MISSING="$MISSING VERCEL_ORG_ID"
                  [ -z "$VERCEL_PROJECT_ID" ]     && MISSING="$MISSING VERCEL_PROJECT_ID"
                  [ -z "$VITE_SUPABASE_URL" ]     && MISSING="$MISSING VITE_SUPABASE_URL"
                  [ -z "$VITE_SUPABASE_ANON_KEY" ] && MISSING="$MISSING VITE_SUPABASE_ANON_KEY"
                  if [ -n "$MISSING" ]; then
                    echo "❌ Missing required GitHub secrets:$MISSING"
                    echo "   Configure them at: Repo → Settings → Secrets and variables → Actions"
                    exit 1
                  fi
                  echo "✅ All required secrets present."
              env:
                  VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
                  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
                  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
                  VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
                  VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

            - name: Pull Vercel Environment Information
              run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN" --scope="$VERCEL_ORG_ID"
              env:
                  VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
                  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
                  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

            - name: Build Project
              run: pnpm build
              env:
                  VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
                  VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
                  VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}

            - name: Deploy to Vercel
              id: deploy_step
              run: |
                  # Remove .git to bypass Vercel's "Git author must have access" check
                  rm -rf .git
                  # Retry up to 4 times with exponential backoff for transient network errors
                  for attempt in 1 2 3 4; do
                    echo "Attempt $attempt..."
                    DEPLOY_OUTPUT=$(vercel deploy --prod --token="$VERCEL_TOKEN" --scope="$VERCEL_ORG_ID" --yes 2>&1) && {
                      echo "Deploy succeeded on attempt $attempt"
                      # Capture the deployment URL from Vercel CLI output
                      DEPLOY_URL=$(echo "$DEPLOY_OUTPUT" | grep -oP 'https://[^\s]+\.vercel\.app' | tail -1)
                      echo "url=${DEPLOY_URL:-https://licitacion-ai-pro.vercel.app}" >> "$GITHUB_OUTPUT"
                      exit 0
                    }
                    if [ $attempt -lt 4 ]; then
                      sleep_time=$((2 ** attempt))
                      echo "Deploy failed, retrying in ${sleep_time}s..."
                      sleep $sleep_time
                    fi
                  done
                  echo "Deploy failed after 4 attempts"
                  exit 1
              env:
                  VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
                  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
                  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    # 6. Deploy to Supabase (Backend)
    deploy-supabase:
        name: ⚡ Deploy to Supabase
        needs: deploy-vercel
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        runs-on: ubuntu-latest
        timeout-minutes: 10
        steps:
            - uses: actions/checkout@v6

            - uses: supabase/setup-cli@v1
              with:
                  version: latest

            - name: Link Supabase Project
              run: supabase link --project-ref "$SUPABASE_PROJECT_ID"
              env:
                  SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
                  SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}

            - name: Push DB Migrations
              # --include-all tolerates remote migrations not found locally (drift).
              # A failed migration blocks the edge function deploy to prevent schema/code mismatch.
              run: supabase db push --include-all --password "$SUPABASE_DB_PASSWORD"
              env:
                  SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
                  SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
                  SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

            - name: Deploy Edge Functions
              # JWT verification is handled manually inside the function code (supabase.auth.getUser(token)).
              run: |
                  supabase functions deploy analyze-with-agents --no-verify-jwt --project-ref "$SUPABASE_PROJECT_ID"
                  supabase functions deploy chat-with-analysis-agent --no-verify-jwt --project-ref "$SUPABASE_PROJECT_ID"
              env:
                  SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
                  SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}

    # 7. Smoke Test (Post-Deploy Verification)
    smoke-test:
        name: 💨 Smoke Test
        needs: [deploy-vercel, deploy-supabase]
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        runs-on: ubuntu-latest
        steps:
            - name: Verify Frontend Health
              run: |
                  echo "Checking production URL health..."
                  PROD_URL="${{ needs.deploy-vercel.outputs.deployment_url }}"
                  if [ -z "$PROD_URL" ]; then
                    PROD_URL="https://licitacion-ai-pro.vercel.app"
                  fi
                  echo "Target: $PROD_URL"
                  HTTP_STATUS=$(curl -o /dev/null -s -w "%{http_code}\n" "$PROD_URL")
                  echo "Status Code: $HTTP_STATUS"

                  if [ "$HTTP_STATUS" != "200" ]; then
                    echo "❌ Smoke Test Failed: HTTP $HTTP_STATUS"
                    exit 1
                  fi
                  echo "✅ Frontend Smoke Test Passed: Site is reachable."

            - name: Verify Edge Function CORS
              run: |
                  SUPABASE_URL="https://${{ secrets.SUPABASE_PROJECT_ID }}.supabase.co"
                  echo "Checking Edge Function CORS: $SUPABASE_URL/functions/v1/analyze-with-agents"
                  HTTP_STATUS=$(curl -o /dev/null -s -w "%{http_code}" \
                      -X OPTIONS \
                      -H "Origin: https://licitacion-ai-pro.vercel.app" \
                      -H "Access-Control-Request-Method: POST" \
                      "$SUPABASE_URL/functions/v1/analyze-with-agents")
                  echo "CORS preflight Status: $HTTP_STATUS"

                  if [ "$HTTP_STATUS" != "200" ] && [ "$HTTP_STATUS" != "204" ]; then
                    echo "❌ Edge Function CORS check failed: HTTP $HTTP_STATUS"
                    exit 1
                  fi
                  echo "✅ Edge Function CORS Passed."

            - name: Verify Conversational Edge Function CORS
              run: |
                  SUPABASE_URL="https://${{ secrets.SUPABASE_PROJECT_ID }}.supabase.co"
                  echo "Checking Edge Function CORS: $SUPABASE_URL/functions/v1/chat-with-analysis-agent"
                  HTTP_STATUS=$(curl -o /dev/null -s -w "%{http_code}" \
                      -X OPTIONS \
                      -H "Origin: https://licitacion-ai-pro.vercel.app" \
                      -H "Access-Control-Request-Method: POST" \
                      "$SUPABASE_URL/functions/v1/chat-with-analysis-agent")
                  echo "CORS preflight Status: $HTTP_STATUS"

                  if [ "$HTTP_STATUS" != "200" ] && [ "$HTTP_STATUS" != "204" ]; then
                    echo "❌ Conversational Edge Function CORS check failed: HTTP $HTTP_STATUS"
                    exit 1
                  fi
                  echo "✅ Conversational Edge Function CORS Passed."

    # 8. Docker Build Validation (parallel, does not block deploy)
    docker-build:
        name: 🐳 Docker Build Check
        runs-on: ubuntu-latest
        timeout-minutes: 10
        steps:
            - uses: actions/checkout@v6
            - name: Build Docker Image
              run: docker build -t licitacion-ai-pro:ci-test .
